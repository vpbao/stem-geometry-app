<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Demo — Hình Học STEM</title>
  <meta name="robots" content="noindex" />

  <!-- A-Frame + AR.js from CDN (zero install) -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: 'Baloo 2', sans-serif; }

    /* Overlay UI */
    .ar-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 12px 16px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ar-overlay h1 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }
    .ar-overlay p {
      font-size: 0.75rem;
      opacity: 0.8;
      margin: 0;
    }
    .ar-back {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    /* Bottom hint */
    .ar-hint {
      position: fixed;
      bottom: 20px;
      left: 50%; transform: translateX(-50%);
      z-index: 1000;
      background: rgba(37,99,235,0.85);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 700;
      animation: pulse 2s ease infinite;
      pointer-events: none;
      white-space: nowrap;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.7; transform: translateX(-50%) scale(0.96); }
    }

    /* Hide AR.js debug UI */
    .a-enter-vr, .a-orientation-modal { display: none !important; }
  </style>
</head>
<body>

  <!-- Top overlay -->
  <div class="ar-overlay">
    <button class="ar-back" onclick="window.location.href='index.html'">← Quay lại</button>
    <div>
      <h1>📐 AR Demo — Hình Học 3D</h1>
      <p>Hướng camera vào <strong>marker Hiro</strong> trên mảnh ghép</p>
    </div>
  </div>

  <!-- Bottom hint -->
  <div class="ar-hint" id="hint">📷 Đang tìm marker… Hướng camera vào hình vuông đen</div>

  <!-- ═══════════════════════════════════
       A-Frame AR Scene
       - Uses default "hiro" marker (print from: https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png)
       - Shows a 3D triangle with colored vertices + rotating animation
       ═══════════════════════════════════ -->
  <!-- Custom A-Frame components for proper triangle geometry -->
  <script>
    // Triangle edges component — draws 3 lines forming a perfect triangle
    AFRAME.registerComponent('triangle-edges', {
      init: function () {
        const B = new THREE.Vector3(-0.5, 0, 0);    // bottom-left
        const C = new THREE.Vector3(0.5, 0, 0);     // bottom-right
        const A = new THREE.Vector3(0, 0.866, 0);   // top (equilateral)

        // Create thick lines using TubeGeometry for visibility
        const edges = [[B, C], [C, A], [A, B]];
        const colors = [0x60a5fa, 0x10b981, 0xf97316]; // blue, green, orange

        edges.forEach((edge, i) => {
          const path = new THREE.LineCurve3(edge[0], edge[1]);
          const tubeGeo = new THREE.TubeGeometry(path, 1, 0.02, 8, false);
          const tubeMat = new THREE.MeshStandardMaterial({
            color: colors[i],
            emissive: colors[i],
            emissiveIntensity: 0.6,
            metalness: 0.3,
            roughness: 0.4
          });
          const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
          this.el.object3D.add(tubeMesh);
        });
      }
    });

    // Triangle face component — semi-transparent filled triangle
    AFRAME.registerComponent('triangle-face', {
      init: function () {
        const geometry = new THREE.BufferGeometry();
        const vertices = new Float32Array([
          -0.5, 0, 0,      // B
           0.5, 0, 0,      // C
           0, 0.866, 0     // A
        ]);
        geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        geometry.computeVertexNormals();

        const material = new THREE.MeshStandardMaterial({
          color: 0x2563EB,
          transparent: true,
          opacity: 0.2,
          side: THREE.DoubleSide,
          emissive: 0x2563EB,
          emissiveIntensity: 0.2
        });

        const mesh = new THREE.Mesh(geometry, material);
        this.el.object3D.add(mesh);
      }
    });
  </script>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    vr-mode-ui="enabled: false"
  >
    <!-- Marker: default "hiro" pattern -->
    <a-marker preset="hiro" id="marker1"
              emitevents="true"
              smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">

      <!-- Base platform -->
      <a-circle
        position="0 0 0"
        rotation="-90 0 0"
        radius="0.8"
        color="#1e3a5f"
        opacity="0.3"
        side="double"
      ></a-circle>

      <!-- Rotating triangle group -->
      <a-entity position="0 0.05 0" rotation="-90 0 0"
                animation="property: rotation; from: -90 0 0; to: -90 360 0; loop: true; dur: 10000; easing: linear;">

        <!-- Triangle filled face (semi-transparent) -->
        <a-entity triangle-face></a-entity>

        <!-- Triangle edges (thick glowing tubes) -->
        <a-entity triangle-edges></a-entity>

        <!-- Vertex B (bottom-left) — Blue -->
        <a-sphere position="-0.5 0 0" radius="0.06"
                  color="#2563EB" material="emissive: #1d4ed8; emissiveIntensity: 0.5"></a-sphere>

        <!-- Vertex C (bottom-right) — Green -->
        <a-sphere position="0.5 0 0" radius="0.06"
                  color="#10b981" material="emissive: #059669; emissiveIntensity: 0.5"></a-sphere>

        <!-- Vertex A (top) — Orange -->
        <a-sphere position="0 0.866 0" radius="0.06"
                  color="#f97316" material="emissive: #ea580c; emissiveIntensity: 0.5"></a-sphere>

        <!-- Labels -->
        <a-text value="B" position="-0.6 -0.12 0" align="center" color="#93c5fd" width="1.8"></a-text>
        <a-text value="C" position="0.6 -0.12 0" align="center" color="#6ee7b7" width="1.8"></a-text>
        <a-text value="A" position="0 0.98 0" align="center" color="#fdba74" width="1.8"></a-text>
      </a-entity>

      <!-- Formula floating above (always faces camera) -->
      <a-entity position="0 1.2 0" billboard>
        <a-text
          value="A + B + C = 180"
          align="center"
          color="#ffffff"
          width="3.5"
          animation="property: position; from: 0 0 0; to: 0 0.1 0; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine;"
        ></a-text>
      </a-entity>

      <!-- "STEM" on the ground plane -->
      <a-text
        value="STEM Geometry"
        position="0 0.01 0.5"
        rotation="-90 0 0"
        align="center"
        color="#60a5fa"
        width="1.2"
      ></a-text>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Show/hide hint based on marker detection
    const marker = document.getElementById('marker1');
    const hint = document.getElementById('hint');

    marker.addEventListener('markerFound', () => {
      hint.textContent = '✅ Marker phát hiện! Xem hình tam giác 3D xoay';
      hint.style.background = 'rgba(16,185,129,0.85)';
    });

    marker.addEventListener('markerLost', () => {
      hint.textContent = '📷 Đang tìm marker… Hướng camera vào hình vuông đen';
      hint.style.background = 'rgba(37,99,235,0.85)';
    });
  </script>
</body>
</html>
